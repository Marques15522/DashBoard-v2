<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Investimentos — Dashboard v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07090e;
            --s1: #0c0f18;
            --s2: #111521;
            --border: #1a2035;
            --gold: #c9922a;
            --gold2: #e8b84b;
            --green: #06d6a0;
            --red: #ef476f;
            --blue: #4895ef;
            --text: #dde1f0;
            --muted: #5a6282;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Lateral */
        .sidebar-nav { width: 240px; background: var(--s1); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
        .nav-logo { padding: 0 20px 30px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .nav-item { padding: 12px 20px; font-size: 0.75rem; color: var(--muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: rgba(201, 146, 42, 0.05); color: var(--gold); border-left: 3px solid var(--gold); }

        /* Conteúdo Principal */
        main { flex: 1; overflow-y: auto; padding: 25px; position: relative; }

        /* Grid de KPIs Superior */
        .kpi-grid-top { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card-new { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; height: 110px; }
        .kpi-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; display: flex; justify-content: space-between; }
        .kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; margin: 5px 0; }
        .kpi-sub { font-size: 0.55rem; color: var(--muted); }

        /* Área do Mapa e Sidebar Direita */
        .content-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; height: 600px; }
        .map-section { background: var(--s1); border-radius: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .map-header { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }

        .right-sidebar { display: flex; flex-direction: column; gap: 15px; }
        .side-card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; padding: 18px; flex: 1; overflow-y: auto; }
        .side-title { font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 0.12em; margin-bottom: 12px; color: var(--gold2); display: flex; align-items: center; gap: 8px; }

        /* Utilitários */
        .badge-impact { font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; margin-left: auto; }
        .impact-neg { background: rgba(239, 71, 111, 0.1); color: var(--red); }
        .impact-pos { background: rgba(6, 214, 160, 0.1); color: var(--green); }

        svg path { transition: 0.2s; cursor: pointer; }
        svg path:hover { filter: brightness(1.5); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<aside class="sidebar-nav">
    <div class="nav-logo">
        <div style="font-family:'Cinzel',serif; color:var(--gold); font-size:1rem;">CAPITAL</div>
        <div style="font-size:0.5rem; color:var(--muted); letter-spacing:0.1em;">INVESTIMENTOS</div>
    </div>
    <div class="nav-item active" data-tab="visao">📊 Visão Geral</div>
    <div class="nav-item" data-tab="clientes">👤 Clientes</div>
    <div class="nav-item" data-tab="financeiro">💰 Financeiro</div>
    <div class="nav-item" data-tab="risco">⚠️ Risco</div>
    <div class="nav-item" data-tab="simulador">🧮 Simulador</div>
</aside>

<main id="main">
    <div id="tab-visao" class="tab-panel">
        <div class="kpi-grid-top">
            <div class="kpi-card-new">
                <div class="kpi-label"><span>Score de Mercado</span><span>
